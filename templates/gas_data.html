<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <title>Historical Data - {{ pi_id|upper }}</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 <style>
   body { background-color: #f4f7f6; padding: 30px; text-align: center; }
   .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
 </style>
</head>
<body>

<h1>📜 Historical Data: {{ 'Pen 1' if pi_id == 'pi1' else 'Pen 2' }}</h1>
<a href="/" class="btn btn-secondary mb-4">⬅ Back to Dashboard</a>

<div class="container">
  <form method="POST" class="row g-3 justify-content-center">
    <div class="col-auto"><input type="date" name="from_date" class="form-control" required value="{{ from_date if from_date else '' }}"></div>
    <div class="col-auto"><input type="date" name="to_date" class="form-control" required value="{{ to_date if to_date else '' }}"></div>
    <div class="col-auto">
      <select name="period" class="form-select">
        <option value="all">All Hours</option>
        <option value="day">Day (9am-1pm)</option>
        <option value="evening">Evening (1pm-7pm)</option>
        <option value="night">Night (7pm-9am)</option>
      </select>
    </div>
    <div class="col-auto"><button type="submit" class="btn btn-primary">Filter</button></div>
  </form>

  <div class="mt-5">
    <canvas id="historyChart"></canvas>
  </div>
  
  <form method="POST" action="/download_gas" class="mt-3">
      <input type="hidden" name="pi_id" value="{{ pi_id }}">
      <input type="hidden" name="from_date" value="{{ from_date }}">
      <input type="hidden" name="to_date" value="{{ to_date }}">
      <button class="btn btn-success">⬇️ Download Data (CSV)</button>
  </form>
</div>

<script>
 const rawData = {{ data | safe }};
 const labels = rawData.map(d => d.created_at.split(' ')[1]); // Time only
 const co2 = rawData.map(d => d.CO2);
 const ch4 = rawData.map(d => d.CH4);
 const nh3 = rawData.map(d => d.NH3);

 new Chart(document.getElementById('historyChart'), {
   type: 'line',
   data: {
     labels: labels,
     datasets: [
       { label: 'CO₂', data: co2, borderColor: 'green', borderWidth: 2 },
       { label: 'CH₄', data: ch4, borderColor: 'orange', borderWidth: 2 },
       { label: 'NH₃', data: nh3, borderColor: 'purple', borderWidth: 2 }
     ]
   },
   options: {
     responsive: true,
     scales: { y: { beginAtZero: true } }
   }
 });
</script>

</body>
</html>
